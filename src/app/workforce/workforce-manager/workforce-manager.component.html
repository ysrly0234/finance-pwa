<div class="manager-container">
    <div class="controls-bar" dir="rtl">
        <h1 style="width: 100%;margin: 0;">
            <span class="toolbar-title">ניהול עובדים וזמינות</span>
        </h1>
        <!-- Department Selector -->
        <mat-form-field appearance="outline" class="dept-select" [subscriptSizing]="'dynamic'">
            <mat-label>מחלקה</mat-label>
            <mat-select [ngModel]="selectedDeptIndex()" (selectionChange)="onDeptChange($event.value)">
                <mat-option *ngFor="let dept of departments(); let i = index" [value]="i">{{ dept.deptName
                    }}</mat-option>
            </mat-select>
        </mat-form-field>

        <div class="filter-row">
            <app-timeline-control (timeChange)="onTimeChange($event)"></app-timeline-control>

            <mat-form-field appearance="outline" class="search-field" [subscriptSizing]="'dynamic'">
                <mat-label>חיפוש עובדים</mat-label>
                <mat-icon matPrefix>search</mat-icon>
                <input matInput [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)"
                    placeholder="שם או מספר עובד">
            </mat-form-field>
        </div>
    </div>

    <div class="grid-container" dir="rtl">
        <app-employee-card *ngFor="let node of displayedNodes()" [employee]="node.employee"
            [availability]="node.availability" [nextAvailability]="node.nextAvailability"
            [activeBackups]="node.activeBackups" [phone]="node.phone" (onEditStates)="openEditStates(node.employee)"
            (onManageBackups)="openManageBackups(node.employee)"></app-employee-card>

        <div *ngIf="displayedNodes().length === 0" class="no-results">
            לא נמצאו עובדים במחלקה זו.
        </div>
    </div>
</div>
